<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leerplan Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --c-primary: #5d6d63;
        --c-soft: #b3d7d5;
        --c-accent: #e3cc66;
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-900" style="background-color: var(--c-soft)">
    <main class="mx-auto w-full max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="rounded-2xl bg-white p-5 shadow-lg ring-1 sm:p-8" style="ring-color: var(--c-primary)">
        <header class="mb-6">
          <h1 class="text-2xl font-bold tracking-tight sm:text-3xl">Leerplan Filter</h1>
          <p class="mt-2 text-sm text-slate-600 sm:text-base">
            Filter op fase, domein en subdomein en toon de bijhorende gegevens.
          </p>
          <div class="mt-4 max-w-sm">
            <label class="flex flex-col gap-1">
              <span class="text-sm font-medium text-slate-700">Kies Leerplan</span>
              <select
                id="leerplanSelect"
                class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#5d6d63] focus:ring-2 focus:ring-[#b3d7d5]"
              >
                <option value="wiskunde">Wiskunde</option>
                <option value="nederlands-en-communicatie">Nederlands en communicatie</option>
                <option value="aardrijkskunde">Aardrijkskunde</option>
                <option value="frans">Frans</option>
                <option value="geschiedenis">Geschiedenis</option>
                <option value="ict">ICT</option>
                <option value="leren-leren">Leren leren</option>
                <option value="bewegingsopvoeding">Bewegingsopvoeding</option>
                <option value="muzische-vorming">Muzische vorming</option>
                <option value="rooms-katholieke-godsdienst">Rooms-Katholieke Godsdienst</option>
                <option value="veilige-en-gezonde-levensstijl">Veilige en gezonde levensstijl</option>
                <option value="wetenschappen-en-techniek">Wetenschappen en techniek</option>
              </select>
            </label>
          </div>
        </header>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-700">Kies Fase</span>
            <select
              id="faseSelect"
              class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#5d6d63] focus:ring-2 focus:ring-[#b3d7d5]"
            >
              <option value="">Alle fases</option>
            </select>
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-700">Kies Domein</span>
            <select
              id="domeinSelect"
              class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#5d6d63] focus:ring-2 focus:ring-[#b3d7d5]"
            >
              <option value="">Alle domeinen</option>
            </select>
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-700">Kies Subdomein</span>
            <select
              id="subdomeinSelect"
              class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#5d6d63] focus:ring-2 focus:ring-[#b3d7d5]"
            >
              <option value="">Alle subdomeinen</option>
            </select>
          </label>
        </div>

        <div class="mt-4 rounded-xl border border-slate-200 bg-slate-50 p-4">
          <p class="text-sm font-medium text-slate-700">Selecteer Cluster(s)</p>
          <div id="clusterFilterGroup" class="mt-2 flex flex-wrap gap-x-5 gap-y-2 text-sm text-slate-700">
            <label class="inline-flex items-center gap-2">
              <input type="checkbox" class="cluster-checkbox h-4 w-4 rounded border-slate-300" value="G" checked />
              <span>G</span>
            </label>
            <label class="inline-flex items-center gap-2">
              <input type="checkbox" class="cluster-checkbox h-4 w-4 rounded border-slate-300" value="MD" checked />
              <span>MD</span>
            </label>
            <label class="inline-flex items-center gap-2">
              <input type="checkbox" class="cluster-checkbox h-4 w-4 rounded border-slate-300" value="P" checked />
              <span>P</span>
            </label>
            <label class="inline-flex items-center gap-2">
              <input type="checkbox" class="cluster-checkbox h-4 w-4 rounded border-slate-300" value="+" checked />
              <span>+</span>
            </label>
            <label class="inline-flex items-center gap-2">
              <input type="checkbox" class="cluster-checkbox h-4 w-4 rounded border-slate-300" value="S" checked />
              <span>S</span>
            </label>
            <label class="inline-flex items-center gap-2">
              <input type="checkbox" class="cluster-checkbox h-4 w-4 rounded border-slate-300" value="Z" checked />
              <span>Z</span>
            </label>
            <label class="inline-flex items-center gap-2">
              <input type="checkbox" class="cluster-checkbox h-4 w-4 rounded border-slate-300" value="A" checked />
              <span>A</span>
            </label>
          </div>
        </div>

        <div class="mt-5 flex flex-col gap-3 sm:flex-row">
          <button
            id="showButton"
            class="inline-flex items-center justify-center rounded-xl bg-[#5d6d63] px-4 py-2 text-sm font-semibold text-white transition hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-[#b3d7d5]"
          >
            Gegevens tonen
          </button>
          <button
            id="resetButton"
            class="inline-flex items-center justify-center rounded-xl bg-[#e3cc66] px-4 py-2 text-sm font-semibold text-slate-900 transition hover:brightness-95 focus:outline-none focus:ring-2 focus:ring-[#b3d7d5]"
          >
            Reset
          </button>
        </div>
      </section>

      <section id="outputArea" class="mt-6 rounded-2xl bg-white p-5 shadow-lg ring-1 sm:p-8" style="ring-color: var(--c-primary)">
        <div
          id="status"
          class="rounded-xl border border-dashed border-slate-300 bg-slate-50 p-6 text-center text-sm text-slate-600"
        >
          Kies filters en klik op <strong>Gegevens tonen</strong> om resultaten te zien.
        </div>

        <div id="tableWrapper" class="hidden overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead style="background-color: var(--c-soft)">
              <tr>
                <th class="px-4 py-3 text-left font-semibold text-slate-700">niveau</th>
                <th class="px-4 py-3 text-left font-semibold text-slate-700">cluster</th>
                <th class="px-4 py-3 text-left font-semibold text-slate-700">leerplandoel</th>
                <th class="px-4 py-3 text-left font-semibold text-slate-700">voorbeeld</th>
              </tr>
            </thead>
            <tbody id="resultBody" class="divide-y divide-slate-100 bg-white"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
