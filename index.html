<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leerplan Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto w-full max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="rounded-2xl bg-white p-5 shadow-lg ring-1 ring-slate-200 sm:p-8">
        <header class="mb-6">
          <h1 class="text-2xl font-bold tracking-tight sm:text-3xl">Leerplan Filter</h1>
          <p class="mt-2 text-sm text-slate-600 sm:text-base">
            Filter op fase, domein en subdomein en toon de bijhorende gegevens.
          </p>
        </header>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-700">Kies Fase</span>
            <select
              id="faseSelect"
              class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
            >
              <option value="">Alle fases</option>
            </select>
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-700">Kies Domein</span>
            <select
              id="domeinSelect"
              class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
            >
              <option value="">Alle domeinen</option>
            </select>
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-700">Kies Subdomein</span>
            <select
              id="subdomeinSelect"
              class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
            >
              <option value="">Alle subdomeinen</option>
            </select>
          </label>
        </div>

        <div class="mt-5 flex flex-col gap-3 sm:flex-row">
          <button
            id="showButton"
            class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-300"
          >
            Gegevens tonen
          </button>
          <button
            id="resetButton"
            class="inline-flex items-center justify-center rounded-xl bg-slate-200 px-4 py-2 text-sm font-semibold text-slate-800 transition hover:bg-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-300"
          >
            Reset
          </button>
        </div>
      </section>

      <section id="outputArea" class="mt-6 rounded-2xl bg-white p-5 shadow-lg ring-1 ring-slate-200 sm:p-8">
        <div
          id="status"
          class="rounded-xl border border-dashed border-slate-300 bg-slate-50 p-6 text-center text-sm text-slate-600"
        >
          Kies filters en klik op <strong>Gegevens tonen</strong> om resultaten te zien.
        </div>

        <div id="tableWrapper" class="hidden overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-100">
              <tr>
                <th class="px-4 py-3 text-left font-semibold text-slate-700">colI</th>
                <th class="px-4 py-3 text-left font-semibold text-slate-700">colJ</th>
                <th class="px-4 py-3 text-left font-semibold text-slate-700">colK</th>
              </tr>
            </thead>
            <tbody id="resultBody" class="divide-y divide-slate-100 bg-white"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
